configuration: Release

version: 1.0.{build}

# netstandard2.0 lib, but Npgsql 8 + Microsoft.SemanticKernel.Connectors.Postgres
# 1.8.0-alpha need a modern SDK to restore — use the 2022 image.
image: Visual Studio 2022

build:
    parallel: true
    publish_nuget: true
    verbosity: minimal

before_build:
  - dotnet restore

# Library repo — no CI tests (the PostgreSQLTests project is integration-only and
# stays out of the solution / repo).
test: off

branches:
    only:
      - main

deploy:
  provider: NuGet
  # Same as the other RevStackCore repos: no explicit server (account default feed)
  # + the RevStackCore-account key that MySQL/MySQL.BulkInsert publish with.
  api_key:
    secure: PcXqIhdC7ZETvlKSX4Zd5kgSp8OoLl59L1T5S9QLuYY=
  skip_symbols: false
  artifact: /.*\.nupkg/
