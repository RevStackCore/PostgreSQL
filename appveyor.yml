configuration: Release

version: 1.0.{build}

# netstandard2.0 lib, but Npgsql 8 + Microsoft.SemanticKernel.Connectors.Postgres
# 1.8.0-alpha need a modern SDK to restore — use the 2022 image.
image: Visual Studio 2022

build:
    parallel: true
    publish_nuget: true
    verbosity: minimal

before_build:
  - dotnet restore

# Library repo — no CI tests (the PostgreSQLTests project is integration-only and
# stays out of the solution / repo).
test: off

branches:
    only:
      - main

deploy:
  provider: NuGet
  # No explicit server (account default feed), like the other RevStackCore repos.
  # Encrypted (AppVeyor "Encrypt YAML") form of the newly-generated feed key.
  api_key:
    secure: 508iP//ZlumWc1i56jve5XnZXQGZl9Fzd9s+oHJt1GEiIvchqg/Eb/0u2e3X2/a8
  skip_symbols: false
  artifact: /.*\.nupkg/
